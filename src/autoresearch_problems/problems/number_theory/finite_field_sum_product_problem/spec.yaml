name: finite_field_sum_product_problem
category: number_theory
description: >
  Construct sets X ⊆ F_p of size ⌊√p⌋ that minimise max(|X+X|, |X·X|),
  challenging the sum-product conjecture over finite fields.
  Here X+X = {x+y mod p : x,y ∈ X} and X·X = {x·y mod p : x,y ∈ X}.
  Following the AlphaEvolve paper ("Mathematical Discovery at Scale"), the
  construction is evaluated across multiple primes p.  For each prime the
  normalised score is  log(max(|X+X|, |X·X|)) / log(|X|).  The final score
  is the average of these normalised values.  Lower is better.
  An arithmetic progression gives |X+X| = 2k−1 (ratio ~1) but large |X·X|.
  AlphaEvolve found constructions achieving average ratio ≈ 1.5 using AP∩GP.

output_type: numpy_array

function_name: solve
evaluator_entrypoint: evaluate
evaluator_dependencies:
  - "numpy>=1.24"

parameters:
  primes: [101, 257, 1009]   # primes ≡ 1 mod 4

timeout_seconds: 120.0
maximize: false
known_best_score: null  # Best known normalised ratio; exact optimum is open

source: "https://github.com/google-deepmind/alphaevolve_repository_of_problems"
tags:
  - number_theory
  - finite-fields
  - sum-product
  - additive-combinatorics
  - alphaevolve
  - open-problem
