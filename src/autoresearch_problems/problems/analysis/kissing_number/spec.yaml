name: kissing_number
category: analysis
description: >
  Find the largest arrangement of non-overlapping unit spheres that all touch
  a central unit sphere in d dimensions (the kissing number problem).
  Each candidate sphere is specified by its centre vector at distance exactly 2
  from the origin (so the spheres just touch the central sphere).
  No two candidate spheres may overlap (centres must be at distance >= 2).
  The score is the number of valid kissing spheres.

output_type: numpy_array

function_name: solve
evaluator_entrypoint: evaluate
evaluator_dependencies:
  - "numpy>=1.24"

parameters:
  d: 3

timeout_seconds: 60.0
maximize: true
known_best_score: 12.0

source: "AlphaEvolve (Google DeepMind)"
tags:
  - geometry
  - kissing-number
  - sphere-packing
  - open-problem
