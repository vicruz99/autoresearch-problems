name: first_autocorr_ineq
category: analysis
description: >
  Find a non-negative function f: R → R that minimizes the upper bound of the
  first autocorrelation inequality constant C₁, defined by:
  max_{t} f★f(t) ≥ C₁ (∫f(x) dx)²
  where f★f is the autoconvolution. The score is BENCHMARK / c1 (higher means
  closer to or beating the known upper bound). BENCHMARK = 1.5052939684401607.

output_type: list

function_name: solve
evaluator_entrypoint: evaluate
evaluator_dependencies:
  - "numpy>=1.24"

parameters: {}

timeout_seconds: 60.0
maximize: true
known_best_score: 1.0

source: "https://github.com/SakanaAI/ShinkaEvolve"
tags:
  - analysis
  - autocorrelation
  - step-function
  - alphaevolve
