name: second_autocorr_ineq
category: analysis
description: >
  Find a non-negative step function that maximizes the second autocorrelation
  constant C₂ = ‖f*f‖₂² / (‖f*f‖₁ · ‖f*f‖∞). This is a lower bound —
  higher C₂ values are better. AlphaEvolve achieved C₂ ≥ 0.8963.
output_type: list
function_name: solve
evaluator_entrypoint: evaluate
evaluator_dependencies:
  - "numpy>=1.24"
parameters: {}
timeout_seconds: 60.0
maximize: true
known_best_score: 0.8962799441554083
source: "AlphaEvolve (Google DeepMind)"
tags:
  - analysis
  - open-problem
  - autocorrelation
  - additive-combinatorics
  - optimization
