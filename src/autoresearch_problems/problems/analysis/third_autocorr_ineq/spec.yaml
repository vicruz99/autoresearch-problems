name: third_autocorr_ineq
category: analysis
description: >
  Find a step function on [-1/4, 1/4] (values may be negative) that minimizes
  the third autocorrelation constant C₃ = 2n·max|f*f| / (Σ|f|)². This provides
  an upper bound on C₃. Lower is better. AlphaEvolve achieved C₃ ≤ 1.4556.
output_type: list
function_name: solve
evaluator_entrypoint: evaluate
evaluator_dependencies:
  - "numpy>=1.24"
parameters: {}
timeout_seconds: 60.0
maximize: false
known_best_score: 1.4556427953745406
source: "AlphaEvolve (Google DeepMind)"
tags:
  - analysis
  - open-problem
  - autocorrelation
  - additive-combinatorics
  - optimization
