name: first_autocorrelation_inequality
category: analysis
description: >
  Find a non-negative step function f on [-1/4, 1/4] that minimizes the first
  autocorrelation constant C₁ = max_{|t|≤1/2} (f*f)(t) / (∫f)². This gives an
  upper bound on C₁. Lower is better. Previously C₁ ≤ 1.5098; AlphaEvolve
  improved to C₁ ≤ 1.5053. Known lower bound: C₁ ≥ 1.28.

output_type: "list[float]"

function_name: solve
evaluator_entrypoint: evaluate
evaluator_dependencies:
  - "numpy>=1.24"

parameters:
  num_intervals: 600

timeout_seconds: 120.0
maximize: false

known_best_score: 1.5052939684401607

source: "AlphaEvolve (Google DeepMind)"
tags:
  - analysis
  - open-problem
  - autocorrelation
  - additive-combinatorics
  - optimization
