name: kissing_number_10d
category: geometry
description: >
  Kissing number problem in dimension 10: find the maximum number of
  non-overlapping unit spheres that can simultaneously touch a central unit
  sphere in 10-dimensional space. Equivalently, find a set C ⊂ R^10 with
  0 ∉ C such that min_{x≠y} ||x-y|| ≥ max_x ||x|| and |C| is maximised.
  Best known lower bound: 500 (matched by AlphaEvolve). Upper bound: 554.
output_type: numpy_array
function_name: solve
evaluator_entrypoint: evaluate
evaluator_dependencies:
  - "numpy>=1.24"
  - "scipy>=1.10"
parameters:
  dimension: 10
timeout_seconds: 120.0
maximize: true
known_best_score: 500
source: "https://github.com/google-deepmind/alphaevolve_repository_of_problems"
tags:
  - geometry
  - kissing-number
  - sphere-packing
  - alphaevolve
  - open-problem
