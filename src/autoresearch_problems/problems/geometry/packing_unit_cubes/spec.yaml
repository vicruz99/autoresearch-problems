name: packing_unit_cubes
category: geometry
description: >
  Pack n=11 unit cubes in the smallest possible bounding cube.
  Score = -bounding_box_side_length (maximize = minimize bounding box).
  Cubes may be rotated arbitrarily. Output is (11, 6): center and Euler angles.
output_type: numpy_array
function_name: solve
evaluator_entrypoint: evaluate
evaluator_dependencies:
  - "numpy>=1.24"
parameters:
  n: 11
timeout_seconds: 60.0
maximize: true
known_best_score: null
source: "Google DeepMind / AlphaEvolve (Apache 2.0)"
tags:
  - geometry
  - packing
  - cubes
  - 3d
